---
# Traefik Helm Chart Configuration
traefik_namespace: "traefik"
traefik_release_name: "traefik"
traefik_chart_repo: "traefik"
traefik_chart_repo_url: "https://traefik.github.io/charts"
traefik_chart_name: "traefik"

# Helm settings
traefik_helm_timeout: "10m"

# Entrypoints configuration
traefik_web_port: 80
traefik_websecure_port: 443

# HTTP to HTTPS redirect (Traefik Helm chart v39+ syntax)
traefik_redirect_http_to_https: true

# Service type
traefik_service_type: "LoadBalancer"

# Resource limits
traefik_cpu_request: "100m"
traefik_memory_request: "128Mi"
traefik_cpu_limit: "300m"
traefik_memory_limit: "256Mi"

# Replica count
traefik_replicas: 1

# Pod wait timeout
traefik_pod_wait_timeout: "300s"

# Logging
traefik_log_level: "ERROR"
traefik_access_log_enabled: false
